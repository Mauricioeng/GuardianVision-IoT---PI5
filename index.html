<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guardian IA - Radar Cidadão & ODS 3</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      theme: { 
        extend: { 
          colors: { primary: '#008080', dark: '#004d4d', light: '#e0f2f1', oled: '#0a0a0a', health: '#e11d48' },
          animation: { 
            'blink-lid': 'blink-lid 5s infinite',
            'bounce-slow': 'bounce 3s infinite',
            'pulse-slow': 'pulse 4s infinite',
            'float': 'float 4s ease-in-out infinite',
            'spin-jump': 'spin-jump 1s ease-in-out',
            'fall': 'fall 2.5s ease-in forwards',
            'slide-in': 'slide-in 0.5s ease-out forwards',
            'tear-drop': 'tear-drop 2s ease-in infinite'
          },
          keyframes: {
            'blink-lid': { '0%, 96%, 98%, 100%': { height: '12px' }, '97%, 99%': { height: '100%' } },
            'float': { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } },
            'spin-jump': { '0%': { transform: 'translateY(0) rotate(0deg)' }, '40%': { transform: 'translateY(-40px) rotate(180deg)' }, '80%': { transform: 'translateY(0) rotate(360deg)' }, '100%': { transform: 'translateY(0) rotate(360deg)' } },
            'fall': { '0%': { transform: 'translateY(-80px)', opacity: 0 }, '10%': { opacity: 1 }, '80%': { opacity: 1 }, '100%': { transform: 'translateY(120px)', opacity: 0 } },
            'slide-in': { '0%': { transform: 'translateX(-30px)', opacity: 0 }, '100%': { transform: 'translateX(0)', opacity: 1 } },
            'tear-drop': { '0%': { transform: 'translateY(0)', opacity: 1 }, '100%': { transform: 'translateY(30px)', opacity: 0 } }
          }
        } 
      } 
    }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f3f4f6; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    @import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@700&display=swap');
    .chalk-font { font-family: 'Cabin Sketch', cursive; }
    .gradient-text { background: linear-gradient(90deg, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .scanlines { background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); background-size: 100% 4px, 3px 100%; }

    @keyframes ticker {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .animate-ticker {
      display: inline-block;
      white-space: nowrap;
      animation: ticker 25s linear infinite;
    }
    @keyframes radar-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .radar-sweep {
      background: conic-gradient(from 0deg, transparent 70%, rgba(16, 185, 129, 0.4) 100%);
      animation: radar-spin 3s linear infinite;
    }
    @keyframes scan-laser {
      0% { top: 0%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    .laser-line {
      position: absolute;
      left: 0; width: 100%; height: 3px;
      background: #10b981;
      box-shadow: 0 0 15px #10b981, 0 0 30px #10b981;
      animation: scan-laser 2.5s ease-in-out infinite;
      z-index: 20;
    }
    .face-guide {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60%; height: 70%; border: 2px dashed rgba(16, 185, 129, 0.5);
      border-radius: 40%; z-index: 10;
    }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    window.globalSensorData = { temp: '--', umid: '--', gas: '--', press: '--', history:[], anomaly: null, mlRainProb: 0, llmReport: 'Buscando satélite...', healthData: {} };

    if ('speechSynthesis' in window) { window.speechSynthesis.getVoices(); }

    const speakText = (text, setSpeaking) => {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel(); 
      
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'pt-BR'; 
      utterance.pitch = 1.0; 
      utterance.rate = 1.05;

      const applyVoiceAndSpeak = () => {
        let voices = window.speechSynthesis.getVoices();
        let ptVoices = voices.filter(v => v.lang.toLowerCase().includes('pt-br') || v.lang.toLowerCase().includes('pt-pt'));
        
        if (ptVoices.length > 0) {
          let bestVoice = ptVoices.find(v => v.name.includes('Natural') || v.name.includes('Google') || v.name.includes('Francisca'));
          utterance.voice = bestVoice || ptVoices[0];
        }
        
        utterance.onstart = () => { if(setSpeaking) setSpeaking(true); };
        utterance.onend = () => { if(setSpeaking) setSpeaking(false); };
        utterance.onerror = () => { if(setSpeaking) setSpeaking(false); };
        
        window.speechSynthesis.speak(utterance);
      };

      if (window.speechSynthesis.getVoices().length === 0) {
        let voicesReady = false;
        window.speechSynthesis.onvoiceschanged = () => {
          if (!voicesReady) { voicesReady = true; applyVoiceAndSpeak(); }
        };
        setTimeout(() => {
          if (!voicesReady) { voicesReady = true; applyVoiceAndSpeak(); }
        }, 500);
      } else {
        applyVoiceAndSpeak();
      }
    };

    const GuardianAvatar = ({ speaking, size = "normal", isAsleep = false, emotion = "normal", context = "none" }) => {
      const isBig = size === "big";
      const [mouthState, setMouthState] = useState({ w: isBig ? 64 : 40, h: isBig ? 6 : 4, rounded: '50%' });
      const [animationClass, setAnimationClass] = useState('animate-float');
      const pupilPosition = context === 'math' ? 'bottom-2 left-2' : 'bottom-1 right-1';

      useEffect(() => {
        if (emotion === 'happy') { setAnimationClass('animate-spin-jump'); setTimeout(() => setAnimationClass('animate-float'), 1200); } 
        else if (emotion === 'alert') setAnimationClass('animate-pulse');
        else setAnimationClass('animate-float');
      }, [emotion]);

      useEffect(() => {
        if (!speaking) {
          setMouthState({ 
            w: isAsleep ? (isBig ? 16 : 8) : (isBig ? 64 : 40), 
            h: isAsleep ? (isBig ? 16 : 8) : (emotion === 'sad' ? (isBig ? 12 : 6) : (emotion === 'alert' ? (isBig ? 20 : 10) : (isBig ? 8 : 4))), 
            rounded: emotion === 'alert' ? '50%' : '50%',
            border: isAsleep ? 'none' : `solid ${emotion === 'alert' ? 'red' : 'white'} ${isBig ? '8px' : '4px'}`,
            borderTopColor: 'transparent', borderLeftColor: 'transparent', borderRightColor: 'transparent',
            borderBottomColor: emotion === 'sad' ? 'transparent' : (emotion === 'alert' ? 'red' : 'white'),
            bg: isAsleep ? 'gray' : 'transparent',
            transform: emotion === 'sad' ? 'rotate(180deg) translateY(-10px)' : 'none'
          });
          return;
        }

        const interval = setInterval(() => {
          const isWide = Math.random() > 0.5; 
          setMouthState({
            w: isBig ? (isWide ? Math.random() * 20 + 40 : Math.random() * 15 + 15) : (isWide ? Math.random() * 10 + 20 : Math.random() * 8 + 8),
            h: isBig ? (isWide ? Math.random() * 10 + 10 : Math.random() * 20 + 20) : (isWide ? Math.random() * 5 + 5 : Math.random() * 10 + 10),
            rounded: '20px', border: 'none', bg: emotion === 'alert' ? '#ffcccc' : 'white', transform: 'none'
          });
        }, 150); 
        return () => clearInterval(interval);
      },[speaking, isAsleep, isBig, emotion]);

      return (
        <div className="relative flex justify-center items-end h-64 w-full max-w-[300px] mx-auto pb-4 z-10">
          {context === 'math' && (<div className="absolute -left-12 top-6 w-28 h-24 bg-[#1b4d3e] border-4 border-[#5c4033] rounded-md shadow-lg flex items-center justify-center animate-slide-in z-20"><span className="text-white text-2xl chalk-font">2+2=4</span></div>)}
          {context === 'newton' && (<div className="absolute top-0 right-10 text-5xl animate-fall z-30 drop-shadow-lg">🍎</div>)}
          {context === 'health' && (<div className="absolute top-0 right-6 text-5xl animate-pulse-slow z-30 drop-shadow-lg text-health material-symbols-outlined">favorite</div>)}
          {context === 'water' && (<div className="absolute top-0 right-10 text-5xl animate-tear-drop z-30 drop-shadow-lg">💧</div>)}

          <div className="flex flex-col items-center">
            <div className="w-1.5 h-6 bg-gray-400 relative rounded-t-sm z-0">
              <div className={`absolute -top-3 -left-1.5 w-4 h-4 rounded-full shadow-[0_0_15px_currentColor] ${emotion === 'alert' ? 'bg-red-500 text-red-500 animate-ping' : 'bg-emerald-400 text-emerald-400 animate-pulse'}`}></div>
            </div>

            <div className={`bg-oled rounded-3xl flex flex-col items-center justify-center border-[6px] ${isAsleep ? 'border-gray-800' : (emotion === 'alert' ? 'border-red-600 shadow-[0_0_30px_rgba(255,0,0,0.6)]' : 'border-gray-600 shadow-[0_0_20px_rgba(0,128,128,0.5)]')} relative overflow-hidden transition-all duration-500 ${animationClass} ${isBig ? 'w-56 h-48' : 'w-28 h-24 mb-1'} z-10`}>
              <div className="absolute inset-0 scanlines opacity-30 pointer-events-none"></div>
              <div className="absolute top-0 left-0 w-full h-1/2 bg-white opacity-[0.03] rounded-t-xl pointer-events-none"></div>
              <div className="absolute inset-0 shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] pointer-events-none"></div>

              {isAsleep && <div className="absolute top-4 right-6 text-white text-xl animate-bounce-slow font-bold opacity-70 z-20">Zzz</div>}
              {emotion === 'sad' && <div className="absolute right-4 top-10 text-blue-400 text-xl animate-tear-drop z-20">💧</div>}

              {emotion === 'happy' && !isAsleep && (
                <>
                  <div className={`absolute top-1/2 left-2 w-8 h-4 bg-pink-500 rounded-full blur-md opacity-60 z-10`}></div>
                  <div className={`absolute top-1/2 right-2 w-8 h-4 bg-pink-500 rounded-full blur-md opacity-60 z-10`}></div>
                </>
              )}

              <div className={`flex ${isBig ? 'gap-6 mb-4' : 'gap-4 mb-2'} z-20`}>
                <div className={`bg-white rounded-full relative overflow-hidden flex justify-center transition-all ${isBig ? 'w-12 h-16 shadow-[0_0_20px_rgba(255,255,255,0.8)]' : 'w-6 h-8 shadow-[0_0_8px_rgba(255,255,255,0.8)]'} ${emotion === 'sad' && 'h-10 mt-6'} ${emotion === 'alert' && 'bg-red-100 shadow-[0_0_20px_rgba(255,0,0,0.8)]'}`}>
                  <div className={`absolute top-0 w-full ${emotion === 'alert' ? 'bg-red-600' : 'bg-emerald-400'} z-10 ${isAsleep ? 'h-full' : 'animate-blink-lid'}`} style={{height: isAsleep ? '100%' : (isBig ? '16px' : '10px')}}></div>
                  {!isAsleep && <div className={`bg-black rounded-full absolute transition-all duration-300 ${isBig ? `w-5 h-5 ${pupilPosition}` : `w-2 h-2 ${pupilPosition}`}`}></div>}
                </div>
                <div className={`bg-white rounded-full relative overflow-hidden flex justify-center transition-all ${isBig ? 'w-12 h-16 shadow-[0_0_20px_rgba(255,255,255,0.8)]' : 'w-6 h-8 shadow-[0_0_8px_rgba(255,255,255,0.8)]'} ${emotion === 'sad' && 'h-10 mt-6'} ${emotion === 'alert' && 'bg-red-100 shadow-[0_0_20px_rgba(255,0,0,0.8)]'}`}>
                  <div className={`absolute top-0 w-full ${emotion === 'alert' ? 'bg-red-600' : 'bg-emerald-400'} z-10 ${isAsleep ? 'h-full' : 'animate-blink-lid'}`} style={{height: isAsleep ? '100%' : (isBig ? '16px' : '10px')}}></div>
                  {!isAsleep && <div className={`bg-black rounded-full absolute transition-all duration-300 ${isBig ? `w-5 h-5 ${pupilPosition}` : `w-2 h-2 ${pupilPosition}`}`}></div>}
                </div>
              </div>
              
              <div className="z-20" style={{
                width: `${mouthState.w}px`, height: `${mouthState.h}px`, borderRadius: mouthState.rounded, backgroundColor: mouthState.bg || 'transparent', border: mouthState.border || 'none', borderTopColor: mouthState.borderTopColor, borderLeftColor: mouthState.borderLeftColor, borderRightColor: mouthState.borderRightColor, borderBottomColor: mouthState.borderBottomColor, transform: mouthState.transform, transition: 'width 0.1s, height 0.1s, background-color 0.2s, transform 0.3s'
              }}></div>
            </div>
            <div className={`bg-gray-700 border-x-4 border-b-4 border-gray-900 rounded-b-xl shadow-inner z-0 ${isBig ? 'w-16 h-6' : 'w-8 h-3'}`}></div>
          </div>
        </div>
      );
    };

    const WelcomeScreen = ({ onComplete }) => {
      const[step, setStep] = useState(0); 
      const[isSpeaking, setIsSpeaking] = useState(false);
      const[inputValue, setInputValue] = useState('');
      const[speechText, setSpeechText] = useState('Sistema em repouso...');

      const triggerSpeech = (text) => {
        setSpeechText(text);
        speakText(text, setIsSpeaking);
      };

      const handleStart = () => {
        setStep(1);
        triggerSpeech(`Acesso administrativo. Olá, eu sou o Guardian V9. Como posso te chamar?`);
      };

      const handleNameSubmit = (e) => {
        e.preventDefault();
        if(!inputValue.trim()) return;
        const name = inputValue.trim().split(" ")[0];
        setInputValue(''); setStep(3);
        triggerSpeech(`Entendido, ${name}! Analisando sensores e abrindo o painel neural. Seja bem-vindo.`);
        setTimeout(() => { onComplete(name, 'dashboard'); }, 5000);
      };

      return (
        <div className={`min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-1000 bg-gradient-to-br from-slate-900 to-teal-950`}>
          {step > 0 && (
            <div className={`bg-white p-4 rounded-2xl shadow-xl mb-4 max-w-md text-center border-b-4 border-emerald-500 transition-opacity duration-300 z-10 ${isSpeaking ? 'opacity-100 animate-bounce-slow' : 'opacity-90'}`}>
              <p className="text-gray-800 font-medium text-lg leading-snug">"{speechText}"</p>
            </div>
          )}
          <GuardianAvatar speaking={isSpeaking} size="big" isAsleep={step === 0} />
          
          <div className="mt-8 w-full max-w-md z-10 text-center">
            {step === 0 && (
              <div className="flex flex-col gap-4 w-full items-center">
                {/* BOTÃO 1: PAINEL NEURAL */}
                <button 
                  onClick={handleStart} 
                  className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.4)] transition-all flex items-center justify-center gap-2 text-lg border border-emerald-500"
                >
                  <span className="material-symbols-outlined text-2xl">dashboard</span> 
                  Acessar Painel Neural
                </button>

                {/* BOTÃO 2: REGISTRAR DENÚNCIA */}
                <button 
                  onClick={() => window.location.href = 'informes.html'} 
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.4)] transition-all flex items-center justify-center gap-2 text-lg border border-blue-500"
                >
                  <span className="material-symbols-outlined text-2xl">campaign</span> 
                  Registrar Denúncia
                </button>

                {/* BOTÃO 3: S.O.S IMEDIATO */}
                <button 
                  onClick={(e) => { e.preventDefault(); document.getElementById('btn-emergencia').click(); }} 
                  className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(225,29,72,0.6)] transition-all flex items-center justify-center gap-2 text-lg border border-red-500"
                >
                  <span className="material-symbols-outlined text-2xl animate-pulse">emergency</span> 
                  S.O.S IMEDIATO
                </button>
              </div>
            )}
            
            {step === 1 && (
              <form onSubmit={handleNameSubmit} className="flex gap-2 fade-in">
                <input type="text" autoFocus required placeholder="Qual o seu nome?" className="flex-1 bg-white/90 backdrop-blur rounded-xl px-5 py-4 shadow-lg outline-none focus:ring-4 focus:ring-emerald-500 text-lg" value={inputValue} onChange={e => setInputValue(e.target.value)} disabled={isSpeaking} />
                <button type="submit" disabled={isSpeaking} className="bg-emerald-600 text-white p-4 rounded-xl shadow-lg hover:bg-emerald-700 disabled:opacity-50">
                  <span className="material-symbols-outlined text-2xl mt-1">send</span>
                </button>
              </form>
            )}
            
            {step === 3 && (
              <div className="text-center text-emerald-300 mt-4 animate-pulse font-mono text-sm">
                <p>Sincronizando com a nuvem Edge AI...</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    const LocationClimateData = ({ temp }) => {
      const currentTemp = temp !== '--' ? parseFloat(temp) : 25;
      const variacaoHistorica = currentTemp > 30 ? '+2.4°C' : '+1.2°C';
      const statusClima = currentTemp > 30 ? 'CRÍTICO: Ilha de Calor' : 'ATENÇÃO: Aquecimento Padrão';
      const colorAlerta = currentTemp > 30 ? 'bg-red-600' : 'bg-orange-500';

      return (
        <div className="bg-slate-900 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden mb-6 flex flex-col md:flex-row relative z-10 fade-in">
          <div className="md:w-1/3 bg-slate-950 p-6 flex flex-col items-center justify-center relative border-r border-slate-800">
            <div className="absolute top-4 left-4 flex items-center gap-2">
              <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
              <span className="text-emerald-500 text-xs font-mono font-bold tracking-widest">SATÉLITE LOCAL</span>
            </div>
            <div className="w-40 h-40 rounded-full border border-emerald-500/30 relative flex items-center justify-center mt-4">
              <div className="absolute inset-0 rounded-full border border-emerald-500/10 scale-75"></div>
              <div className="absolute inset-0 rounded-full border border-emerald-500/10 scale-50"></div>
              <div className="w-full h-full rounded-full radar-sweep absolute rounded-full"></div>
              <span className="material-symbols-outlined text-emerald-400 text-4xl z-10">my_location</span>
              {currentTemp > 30 && <div className="absolute top-8 right-8 w-3 h-3 bg-red-500 rounded-full blur-[2px] animate-pulse"></div>}
              <div className="absolute bottom-10 left-10 w-2 h-2 bg-orange-400 rounded-full blur-[1px]"></div>
            </div>
            <p className="text-slate-400 text-xs font-mono mt-4">LAT: -23.3619 | LON: -46.7408</p>
          </div>

          <div className="md:w-2/3 p-0 flex flex-col">
            <div className={`${colorAlerta} text-white px-6 py-2 flex justify-between items-center shadow-md`}>
              <span className="font-bold uppercase tracking-wide flex items-center gap-2">
                <span className="material-symbols-outlined text-sm">warning</span> {statusClima}
              </span>
              <span className="text-xs font-mono opacity-80">ATUALIZAÇÃO EM TEMPO REAL</span>
            </div>
            <div className="p-6 flex-1 flex flex-col justify-center bg-gradient-to-br from-slate-900 to-slate-800">
              <h3 className="text-xl font-bold text-white mb-2">Agravamento Térmico Regional</h3>
              <p className="text-slate-300 text-sm mb-6 leading-relaxed">
                Dados cruzados via satélite indicam que o microclima atual sofre influência direta da perda de cobertura vegetal e adensamento urbano. O asfalto e concreto retêm radiação infravermelha.
              </p>
              <div className="grid grid-cols-2 gap-4">
                <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-700">
                  <p className="text-slate-400 text-xs font-bold mb-1">VARIAÇÃO (10 ANOS)</p>
                  <div className="flex items-end gap-2">
                    <span className="text-3xl font-black text-orange-400">{variacaoHistorica}</span>
                    <span className="material-symbols-outlined text-orange-400 mb-1">trending_up</span>
                  </div>
                </div>
                <div className="bg-slate-950/50 p-4 rounded-xl border border-slate-700">
                  <p className="text-slate-400 text-xs font-bold mb-1">IMPACTO NA SAÚDE (ODS 3)</p>
                  <div className="flex items-center gap-2 h-full pb-1">
                    <span className="material-symbols-outlined text-red-400 text-2xl">vital_signs</span>
                    <span className="text-slate-200 text-sm font-medium leading-tight">Estresse cardiovascular moderado a alto</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const Dashboard = ({ data, aiAnalysis }) => {
      const [showReportModal, setShowReportModal] = useState(false);
      const [copySuccess, setCopySuccess] = useState('');

      const generateReportText = () => {
        const sd = window.globalSensorData;
        return `RELATÓRIO AMBIENTAL GUARDIAN (IA)\nData: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}\n\n` +
               `📊 DADOS DOS SENSORES FÍSICOS:\n` +
               `- Temperatura (DHT22): ${sd.temp} °C\n` +
               `- Umidade (DHT22): ${sd.umid} %\n` +
               `- Qualidade do Ar (MQ135): ${sd.gas} ppm\n` +
               `- Pressão Barométrica (BMP280): ${sd.press} hPa\n\n` +
               `🤖 ANÁLISE DE INTELIGÊNCIA ARTIFICIAL:\n${sd.llmReport}\n\n` +
               `🏥 ALERTAS ODS 3 (Saúde e Bem-Estar):\n` +
               `- Pulmão: ${sd.healthData?.respDesc || 'Sem dados'}\n` +
               `- Corpo: ${sd.healthData?.thermalDesc || 'Sem dados'}\n` +
               `- Endemias: ${sd.healthData?.dengueDesc || 'Sem dados'}\n\n` +
               `Sistema Gerador: Guardian V9 AI`;
      };

      const copyToClipboard = () => { navigator.clipboard.writeText(generateReportText()).then(() => { setCopySuccess('Copiado!'); setTimeout(() => setCopySuccess(''), 2000); }); };
      const sendEmailReport = () => { window.location.href = `mailto:?subject=${encodeURIComponent(`Relatório Guardian`)}&body=${encodeURIComponent(generateReportText())}`; };

      const downloadCSV = () => {
        if (!data.feeds || data.feeds.length === 0) return;
        let csvContent = "Data,Hora,Temperatura (C),Umidade (%),Gas MQ135 (ppm),Pressao (hPa)\n";
        data.feeds.forEach(f => {
          const date = new Date(f.created_at).toLocaleDateString('pt-BR');
          const time = new Date(f.created_at).toLocaleTimeString('pt-BR');
          csvContent += `${date},${time},${f.field1 || ''},${f.field2 || ''},${f.field3 || ''},${f.field4 || ''}\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `Guardian_Sensores_${new Date().getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const getMathAnalysis = () => {
        if (!data.feeds || data.feeds.length === 0) return { avgTemp: '--', tempTrend: 0, points: 0, variance: '--', stdDev: '--' };
        const temps = data.feeds.map(f => parseFloat(f.field1)).filter(n => !isNaN(n));
        if(temps.length === 0) return { avgTemp: '--', tempTrend: 0, points: 0, variance: '--', stdDev: '--' };

        const avgTemp = temps.reduce((a, b) => a + b, 0) / temps.length;
        const trend = temps.length > 1 ? temps[temps.length - 1] - temps[0] : 0;
        const squaredDiffs = temps.map(t => Math.pow(t - avgTemp, 2));
        const variance = squaredDiffs.reduce((a, b) => a + b, 0) / temps.length;
        const stdDev = Math.sqrt(variance);

        return { 
          avgTemp: avgTemp.toFixed(1), 
          tempTrend: trend.toFixed(1), 
          variance: variance.toFixed(2),
          stdDev: stdDev.toFixed(2),
          points: temps.length 
        };
      };

      const mathStats = getMathAnalysis();

      useEffect(() => {

      const arData = arClassification();

      return (

                   <button onClick={sendEmailReport} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-semibold flex items-center gap-2 transition-all shadow-md"><span className="material-symbols-outlined text-[20px]">mail</span> Enviar E-mail</button>

                     </span>

    // ==========================================

    const HealthSDG3 = ({ aiAnalysis, userName }) => {
      const hd = aiAnalysis.healthData || {};
      const [activeTab, setActiveTab] = useState('resp'); 
      
      const videoRef = useRef(null);
      const [camStream, setCamStream] = useState(null);
      const [isScanning, setIsScanning] = useState(false);
      const [scanResult, setScanResult] = useState(null);
      const [dbStatus, setDbStatus] = useState('');

      const baseTemp = window.globalSensorData?.temp !== '--' ? parseFloat(window.globalSensorData.temp) : 28;
      const baseGas = window.globalSensorData?.gas !== '--' ? parseFloat(window.globalSensorData.gas) : 800;
      
      const startBiometricScan = async () => {
        try {
          setScanResult(null); setDbStatus('');
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          setCamStream(stream);
          if (videoRef.current) videoRef.current.srcObject = stream;
          setIsScanning(true);
          setTimeout(() => { analyzePsychology(); }, 4000);
        } catch (err) { alert('Erro: Permissão de câmera negada.'); }
      };

      const stopCam = (stream) => { if (stream) stream.getTracks().forEach(track => track.stop()); setCamStream(null); setIsScanning(false); };

      const analyzePsychology = () => {
        let emotion, stressLevel, color, explanation;

        if (baseTemp >= 30) {
          emotion = "Irritabilidade / Fadiga"; stressLevel = "ALTO (85%)"; color = "text-red-500 border-red-500 bg-red-50";
          explanation = `O scanner detectou dilatação pupilar e tensão maxilar. A temperatura extrema de ${baseTemp}°C está aumentando seus níveis de cortisol (hormônio do estresse) e forçando a termorregulação do corpo, gerando esgotamento mental.`;
        } else if (baseGas >= 800) {
          emotion = "Carga Cognitiva / Ansiedade"; stressLevel = "MODERADO (60%)"; color = "text-amber-500 border-amber-500 bg-amber-50";
          explanation = `Detectamos micro-contrações ao redor dos olhos. O nível de gases/poluição (${baseGas} ppm) reduz a oxigenação cerebral, causando letargia leve e dificuldade de foco.`;
        } else {
          emotion = "Calma / Foco"; stressLevel = "BAIXO (15%)"; color = "text-emerald-500 border-emerald-500 bg-emerald-50";
          explanation = `Músculos faciais relaxados e respiração ritmada. A temperatura de ${baseTemp}°C e o ar limpo formam o ambiente perfeito para a saúde mental e produtividade cognitiva.`;
        }

        setScanResult({ emotion, stressLevel, color, explanation, tempAtScan: baseTemp, gasAtScan: baseGas });
        stopCam(camStream);
      };

      const saveBiometricsToDB = () => {
        setDbStatus('Processando e enviando para a Nuvem...');
        
        const payload = {
          usuario: userName || 'Cidadão Local',
          emotion: scanResult.emotion,
          stressLevel: scanResult.stressLevel,
          tempAtScan: scanResult.tempAtScan,
          gasAtScan: scanResult.gasAtScan,
          explanation: scanResult.explanation
        };

        if (typeof google !== 'undefined' && google.script) {
          google.script.run
            .withSuccessHandler((res) => {
              if (res.status === 'success') {
                setDbStatus('✅ Laudo arquivado na Planilha ODS 3!');
              } else {
                setDbStatus('❌ Erro no banco de dados.');
              }
            })
            .withFailureHandler(() => {
              setDbStatus('❌ Falha na conexão de rede.');
            })
            .registrarBiometria(payload); 
        } else {
          setTimeout(() => { setDbStatus('✅ (Teste Local) Registrado no Banco!'); }, 1500);
        }
      };

      useEffect(() => { return () => stopCam(camStream); }, [activeTab]);

      const getCardStyle = (status) => {
        if(status === 'Perigo' || status === 'Alerta') return 'bg-red-50 border-red-400 text-red-800';
        if(status === 'Atenção') return 'bg-yellow-50 border-yellow-400 text-yellow-800';
        return 'bg-emerald-50 border-emerald-400 text-emerald-800';
      };

      return (
        <div className="fade-in max-w-6xl mx-auto pb-10 space-y-12">
          {/* Header */}

            <div className={`p-6 rounded-2xl border-l-8 shadow-md flex flex-col h-full ${getCardStyle(hd.resp)}`}><div className="flex items-center gap-3 mb-4"><span className="material-symbols-outlined text-4xl">air</span><h3 className="font-bold text-xl">Risco Respiratório</h3></div><div className="flex-1"><p className="text-2xl font-black mb-2">{hd.resp}</p><p className="opacity-90">{hd.respDesc}</p></div><div className="mt-4 pt-4 border-t border-current/20 text-sm"><span className="font-bold">Ação:</span> {hd.resp === 'Bom' ? 'Continue respirando fundo!' : 'Ventile a casa para evitar asma ou bronquite.'}</div></div>
            <div className={`p-6 rounded-2xl border-l-8 shadow-md flex flex-col h-full ${getCardStyle(hd.thermal)}`}><div className="flex items-center gap-3 mb-4"><span className="material-symbols-outlined text-4xl">thermostat</span><h3 className="font-bold text-xl">Estresse Térmico</h3></div><div className="flex-1"><p className="text-2xl font-black mb-2">{hd.thermal}</p><p className="opacity-90">{hd.thermalDesc}</p></div><div className="mt-4 pt-4 border-t border-current/20 text-sm"><span className="font-bold">Ação:</span> {hd.thermal === 'Bom' ? 'Ambiente confortável.' : 'Beba muita água! Risco de insolação leve.'}</div></div>

          </div>

          {/* NOVO: Scanner Biométrico */}
          <div className="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
             <h3 className="text-2xl font-bold text-dark mb-4 flex items-center gap-2"><span className="material-symbols-outlined text-indigo-600">center_focus_strong</span> Scanner Biométrico Neural</h3>

                     </React.Fragment>

                     <div className="text-center p-6">

    const EmergencyButton = ({ userName }) => {
      const [isRecording, setIsRecording] = useState(false);
      const [statusMsg, setStatusMsg] = useState('');
      const [recordingTime, setRecordingTime] = useState(0); 
      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const timerRef = useRef(null);

      const stopRecording = async () => {
        setIsRecording(false);
        clearInterval(timerRef.current);
        setStatusMsg('Obtendo GPS e enviando...');
        
        if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
          mediaRecorderRef.current.stop();
        }
      };

      const handleEmergencyClick = async () => {
        if (isRecording) {
          stopRecording();
        } else {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorderRef.current = new MediaRecorder(stream);
            audioChunksRef.current = [];

            mediaRecorderRef.current.ondataavailable = (event) => {
              if (event.data.size > 0) audioChunksRef.current.push(event.data);
            };

            mediaRecorderRef.current.onstop = () => {
              const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
              stream.getTracks().forEach(track => track.stop()); 

              if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                  (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                      const base64Audio = reader.result;
                      
                      if (typeof google !== 'undefined' && google.script) {
                        google.script.run
                          .withSuccessHandler((res) => {
                            if(res.status === 'success') {
                              setStatusMsg('✅ Alerta enviado às autoridades!');
                            } else {
                              setStatusMsg('❌ Erro no servidor.');
                            }
                            setTimeout(() => setStatusMsg(''), 5000);
                          })
                          .withFailureHandler(() => {
                            setStatusMsg('❌ Falha na conexão.');
                            setTimeout(() => setStatusMsg(''), 5000);
                          })
                          .registrarEmergencia({
                            usuario: userName || 'Cidadão Anônimo',
                            latitude: lat,
                            longitude: lng,
                            audioBase64: base64Audio
                          });
                      } else {
                        console.log("Teste Local concluído.", { lat, lng, base64Audio });
                        setStatusMsg('Ambiente de teste: Alerta simulado.');
                        setTimeout(() => setStatusMsg(''), 4000);
                      }
                    };
                  },
                  (error) => {
                    setStatusMsg('❌ Erro: Permissão de GPS negada.');
                    setTimeout(() => setStatusMsg(''), 4000);
                  },
                  { enableHighAccuracy: true, timeout: 10000 }
                );
              } else {
                setStatusMsg('GPS não suportado no navegador.');
                setTimeout(() => setStatusMsg(''), 4000);
              }
            };

            mediaRecorderRef.current.start();
            setIsRecording(true);
            setRecordingTime(0);
            setStatusMsg('🔴 Gravando ambiente... Clique p/ enviar.');
            timerRef.current = setInterval(() => {
              setRecordingTime(prev => prev + 1);
            }, 1000);

            setTimeout(() => {
              if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
                stopRecording();
              }
            }, 30000);

          } catch (err) {
            console.error("Erro:", err);
            setStatusMsg('❌ Permissão de microfone negada!');
            setTimeout(() => setStatusMsg(''), 4000);
          }
        }
      };

      return (
        <div className="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2 fade-in">
          {statusMsg && (
            <div className="bg-slate-900/90 backdrop-blur text-white text-sm px-4 py-2 rounded-xl shadow-2xl border border-slate-700 font-mono animate-pulse">
              {statusMsg}
            </div>
          )}
          
          <div className="relative">
            {isRecording && (
              <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg animate-pulse whitespace-nowrap">
                00:{recordingTime.toString().padStart(2, '0')}
              </div>
            )}
            
            <button 
              id="btn-emergencia"
              title="Botão de Pânico / S.O.S"
              onClick={handleEmergencyClick}
              className={`w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all duration-300 ${
                isRecording 
                  ? 'bg-red-600 animate-pulse border-2 border-red-300 scale-110' 
                  : 'bg-red-500/20 backdrop-blur-md border border-red-500/50 hover:bg-red-600 hover:scale-110'
              }`}
            >
              <span className={`material-symbols-outlined ${isRecording ? 'text-white' : 'text-red-500 hover:text-white'} text-2xl transition-colors`}>
                {isRecording ? 'stop_circle' : 'emergency'}
              </span>
            </button>
          </div>
        </div>
      );
    };

      const processAI = (feeds) => {

        const current = feeds[feeds.length - 1]; const past = feeds[feeds.length - 5];
        
        const pressCur = parseFloat(current.field4) || 1013; const deltaPress = (parseFloat(past.field4) || 1013) - pressCur;

        let anomaly = null;
        if (deltaGas > 300 || gasCur > 1500) anomaly = "🚨 Pico anormal de gases! Risco de asfixia/incêndio.";
        else if (deltaPress > 1.5) anomaly = "⚠️ Queda abrupta de pressão. Alerta de ventania/tempestade perigosa.";

        let rainML = 10;
        if (deltaPress > 0.5 && umid > 70) rainML = 85; else if (deltaPress > 0.2 && umid > 60) rainML = 50; else if (deltaPress < 0 && umid < 50) rainML = 0;

        let report = `A temperatura atual é de ${temp}°C. `;
        if(rainML > 50) report += `Há risco de ${rainML}% de chuva devido à queda de pressão (${deltaPress.toFixed(1)}hPa). Cuidado com os focos de Dengue! `;
        else report += `A Pressão atmosférica está estável, indicando tempo firme. `;
        if(gasCur < 600) report += `O índice de qualidade do ar interno está Saudável (MQ135 = ${gasCur}).`;
        else report += `Atenção: ar ambiente insalubre detectado pelo sensor de gás.`;

        let health = {
          resp: gasCur < 600 ? 'Bom' : (gasCur < 1000 ? 'Atenção' : 'Perigo'),
          respDesc: gasCur < 600 ? 'Ar puro. Pulmões limpos.' : 'Risco para alérgicos e asmáticos.',
          thermal: temp > 32 ? 'Perigo' : (temp > 27 ? 'Atenção' : 'Bom'),
          thermalDesc: temp > 32 ? 'Risco severo de desidratação.' : 'Clima corporal seguro.',
          dengue: rainML > 50 ? 'Alerta' : 'Bom',
          dengueDesc: rainML > 50 ? 'Elimine água parada urgentemente.' : 'Sem poças de chuva previstas.'
        };

        setAiAnalysis({ anomaly, mlRainProb: rainML, llmReport: report, healthData: health });
        window.globalSensorData = { temp, umid, gas: gasCur, press: pressCur, history: feeds, anomaly, mlRainProb: rainML, llmReport: report, healthData: health };
      };

      useEffect(() => {
        if(!appState.isStarted) return;
        const fetchThingSpeak = async () => {
          try {
            const res = await fetch(`https://api.thingspeak.com/channels/${MEU_CANAL_THINGSPEAK}/feeds.json?api_key=${READ_API_KEY}&results=30`);
            const json = await res.json();
            if(json.feeds && json.feeds.length > 0){
              const ultimo = json.feeds[json.feeds.length - 1];
              setSensorData({ temp: ultimo.field1, umid: ultimo.field2, gas: ultimo.field3, press: ultimo.field4 || '1013', feeds: json.feeds });
              processAI(json.feeds);
            }
          } catch(e) { console.log(e); }
        };
        fetchThingSpeak();
        const int = setInterval(fetchThingSpeak, 20000); 
        return () => clearInterval(int);
      },[appState.isStarted]);

      const NavItem = ({ id, icon, label, subtitle }) => (
        <button onClick={() => { setAppState({...appState, page: id}); setMenuOpen(false); window.speechSynthesis.cancel(); }} 
          className={`w-full flex items-center gap-4 px-6 py-4 transition-all duration-200 text-left ${appState.page === id ? 'bg-slate-800 border-l-4 border-emerald-500 font-semibold shadow-inner' : 'hover:bg-slate-800/50 text-slate-300 border-l-4 border-transparent'}`}>
          <span className="material-symbols-outlined text-2xl">{icon}</span> 
          <div><div className="text-[17px] leading-tight text-white">{label}</div><div className="text-xs text-emerald-400/80">{subtitle}</div></div>
        </button>
      );

      const goToChatWithPrompt = (prompt) => { setChatPrompt(prompt); setAppState({...appState, page: 'chatbot'}); };

      return (
        <React.Fragment>
          {!appState.isStarted ? (
            <WelcomeScreen onComplete={(name, page) => setAppState({ isStarted: true, userName: name, page: page })} />
          ) : (
            <div className="flex h-screen overflow-hidden relative">
              <aside className={`bg-slate-900 text-white w-80 flex flex-col fixed md:relative z-50 h-full transition-transform duration-300 shadow-2xl border-r border-slate-700 ${menuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                <div className="p-6 border-b border-slate-700 bg-slate-950 relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500 rounded-full blur-[80px] opacity-20"></div>
                  <div className="flex items-center gap-3 font-bold text-2xl text-emerald-400 relative z-10"><span className="material-symbols-outlined text-3xl">radar</span> Radar Cidadão</div>
                  <p className="text-sm text-slate-400 mt-2 relative z-10">Operador Logado: <span className="text-white font-bold">{appState.userName}</span></p>
                </div>
                <nav className="flex-1 py-4 flex flex-col gap-1 overflow-y-auto">
                  <NavItem id="dashboard" icon="query_stats" label="Painel Integrado" subtitle="Sensores, Clima e ODS 3" />
                  <NavItem id="education" icon="school" label="Educação Edge" subtitle="Microlearning de IA e ODS" />
                  <NavItem id="chatbot" icon="smart_toy" label="Chat IA Guardian" subtitle="Interação em Linguagem Natural" />
                  
                  {/* NOVOS LINKS EXTERNOS */}
                  <div className="mt-6 mb-2 px-6 text-[10px] font-bold text-slate-500 uppercase tracking-wider">Módulos Externos</div>
                  
                  <a href="seviu.html" className="w-full flex items-center gap-4 px-6 py-3 hover:bg-slate-800/50 text-slate-300 transition-all duration-200">
                    <span className="material-symbols-outlined text-xl">visibility</span> 
                    <div className="text-[15px]">SEVIU</div>
                  </a>
                  <a href="ubs.html" className="w-full flex items-center gap-4 px-6 py-3 hover:bg-slate-800/50 text-slate-300 transition-all duration-200">
                    <span className="material-symbols-outlined text-xl">local_hospital</span> 
                    <div className="text-[15px]">UBS Mais Próxima</div>
                  </a>
                  <a href="informes.html" className="w-full flex items-center gap-4 px-6 py-3 hover:bg-slate-800/50 text-slate-300 transition-all duration-200">
                    <span className="material-symbols-outlined text-xl">campaign</span> 
                    <div className="text-[15px]">Informes Cidadão</div>
                  </a>

                </nav>
                <div className="p-4 text-xs text-center text-slate-500 border-t border-slate-800 bg-slate-950 flex justify-center items-center gap-2">
                  <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Sistema Guardian V9 AI
                </div>
              </aside>

              {menuOpen && <div className="fixed inset-0 bg-slate-900/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setMenuOpen(false)}></div>}

              <main className="flex-1 flex flex-col h-full bg-[#f4f7f6]">
                <header className="bg-white shadow-sm p-4 flex items-center gap-4 md:hidden">
                  <button onClick={() => setMenuOpen(true)} className="text-emerald-600 hover:text-emerald-800"><span className="material-symbols-outlined text-3xl mt-1">menu</span></button>
                  <h1 className="font-bold text-xl text-gray-800 gradient-text">Radar Cidadão AI</h1>
                </header>
                <div className="flex-1 overflow-y-auto p-4 md:p-8">
                  {appState.page === 'dashboard' && (
                    <div className="space-y-8">
                      <Dashboard data={sensorData} aiAnalysis={aiAnalysis} />
                      <HealthSDG3 aiAnalysis={aiAnalysis} userName={appState.userName} />
                    </div>
                  )}
                  {appState.page === 'education' && <EducationHub openChatTopic={goToChatWithPrompt} />}
                  {appState.page === 'chatbot' && <Chatbot userName={appState.userName} initialPrompt={chatPrompt} clearInitialPrompt={() => setChatPrompt('')} />}
                </div>
              </main>
            </div>
          )}

          <EmergencyButton userName={appState.userName || 'Cidadão Anônimo'} />
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
